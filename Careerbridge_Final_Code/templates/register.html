{% extends "base.html" %}

{% block title %}Register - CareerBridge{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold">Join CareerBridge</h2>
                        <p class="text-muted">Create your account to get started</p>
                    </div>
                    
                    <form method="POST" action="{{ url_for('auth.register') }}">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="user_type" class="form-label">I am a</label>
                            <select class="form-select" id="user_type" name="user_type" required>
                                <option value="">Select account type</option>
                                <option value="graduate">Graduate / Job Seeker</option>
                                <option value="employer">Employer / Company</option>
                            </select>
                        </div>
                        
                        <!-- Graduate Fields -->
                        <div id="graduateFields" class="mb-3" style="display: none;">
                            <div class="mb-3">
                                <label for="full_name" class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="full_name" name="full_name">
                            </div>
                        </div>
                        
                        <!-- Employer Fields -->
                        <div id="employerFields" class="mb-3" style="display: none;">
                            <div class="mb-3">
                                <label for="company_name" class="form-label">Company Name</label>
                                <input type="text" class="form-control" id="company_name" name="company_name">
                            </div>
                        </div>
                        
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">Create Account</button>
                        </div>
                    </form>
                    
                    <div class="text-center mt-4">
                        <p class="text-muted">Already have an account? 
                            <a href="{{ url_for('auth.login') }}" class="text-decoration-none">Sign in here</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('user_type').addEventListener('change', function() {
    const graduateFields = document.getElementById('graduateFields');
    const employerFields = document.getElementById('employerFields');
    
    graduateFields.style.display = 'none';
    employerFields.style.display = 'none';
    
    if (this.value === 'graduate') {
        graduateFields.style.display = 'block';
    } else if (this.value === 'employer') {
        employerFields.style.display = 'block';
    }
});
</script>
{% endblock %}
